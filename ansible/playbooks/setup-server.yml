---
- name: Configure AWS app server
  hosts: app_servers
  become: true

  vars:
    app_image: "{{ lookup('env', 'APP_IMAGE') | default('nginx:alpine', true) }}"
    app_port: 8080
    container_port: 80

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install required packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - ufw
          - python3-pip
        state: present

    - name: Install Docker
      ansible.builtin.apt:
        name:
          - docker.io
        state: present

    - name: Ensure Docker is running
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Allow SSH
      community.general.ufw:
        rule: allow
        port: "22"
        proto: tcp

    - name: Allow app port
      community.general.ufw:
        rule: allow
        port: "{{ app_port }}"
        proto: tcp

    - name: Enable UFW
      community.general.ufw:
        state: enabled
        policy: deny

    - name: Pull app image
      community.docker.docker_image:
        name: "{{ app_image }}"
        source: pull

    - name: Run app container
      community.docker.docker_container:
        name: app
        image: "{{ app_image }}"
        state: started
        restart_policy: unless-stopped
        ports:
          - "{{ app_port }}:{{ container_port }}"